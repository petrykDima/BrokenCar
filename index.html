<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrokenCar — Range Rover Sport</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="site-header">
        <div class="wrap">
            <span class="brand">BrokenCar</span>
            <span class="brand-sub">Огляд авто</span>
        </div>
    </header>

    <main class="wrap">
        <section class="car-card">
            <div class="car-card__media">
                <span class="car-card__badge">На огляді</span>
            </div>

            <div class="car-card__body">
                <h1 class="car-title">Range Rover Sport</h1>
                <p class="car-subtitle">494 · 3.0 Supercharged</p>

                <dl class="specs">
                    <div class="spec">
                        <dt>Пробіг</dt>
                        <dd>96 000 км</dd>
                    </div>
                    <div class="spec">
                        <dt>VIN-код</dt>
                        <dd class="mono">SALWR2VFXFA612341</dd>
                    </div>
                    <div class="spec">
                        <dt>Двигун</dt>
                        <dd>3.0 Supercharged</dd>
                    </div>
                    <div class="spec">
                        <dt>Модель</dt>
                        <dd>494</dd>
                    </div>
                </dl>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="wrap">
            <span>BrokenCar · стартова інформація</span>
        </div>
    </footer>
</body>
</html>
